<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finlytics — Exportar CSV</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <a href="/" class="home-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
      Volver al home
    </a>

    <header class="header">
      <h1 class="logo">Fin<span>lytics</span></h1>
      <p class="tagline">Estados financieros: vista previa, gráfico y CSV</p>
    </header>

    <div class="search">
      <input
        class="search__input"
        type="text"
        placeholder="Empresa o ticker (ej: Apple, AAPL)"
        autocomplete="off"
        maxlength="40"
      />
      <button class="search__btn" type="button">Buscar</button>
    </div>

    <p id="export-status" class="export-status" role="status"></p>

    <!-- Resultados de la búsqueda por nombre -->
    <ul id="search-results" class="search-results hidden"></ul>

    <!-- Panel de estados financieros: gráfico + tabla + descarga -->
    <section id="financials" class="financials hidden">
      <div class="financials__head">
        <h2 id="financials-title" class="financials__title"></h2>
        <div class="financials__controls">
          <label class="years-label">
            Años
            <select id="years-select" class="years-select">
              <option value="3">3</option>
              <option value="5" selected>5</option>
              <option value="10">10</option>
            </select>
          </label>
          <button id="download-csv" class="btn-download" type="button">Descargar CSV</button>
        </div>
      </div>

      <div class="chart-wrap">
        <svg id="revenue-chart" class="revenue-chart" viewBox="0 0 600 240" role="img" aria-label="Ingresos por año"></svg>
      </div>

      <div class="table-wrap">
        <table id="financials-table" class="fin-table"></table>
      </div>
    </section>
  </main>

  <!-- ============ Chat flotante ============ -->
  <button id="chat-fab" class="chat-fab" type="button" aria-label="Abrir chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 11.5a8.38 8.38 0 0 1 -0.9 3.8 8.5 8.5 0 0 1 -7.6 4.7 8.38 8.38 0 0 1 -3.8 -0.9 L3 21 l1.9 -5.7 a8.38 8.38 0 0 1 -0.9 -3.8 8.5 8.5 0 0 1 4.7 -7.6 8.38 8.38 0 0 1 3.8 -0.9 h0.5 a8.48 8.48 0 0 1 8 8 z" />
    </svg>
  </button>

  <div id="chat-panel" class="chat-panel hidden" role="dialog" aria-label="Asistente Finlytics">
    <header class="chat-panel__head">
      <span class="chat-panel__title">Asistente Finlytics</span>
      <button id="chat-close" class="chat-panel__close" type="button" aria-label="Cerrar chat">&times;</button>
    </header>

    <div id="chat-messages" class="chat-messages"></div>

    <form id="chat-form" class="chat-input">
      <input
        id="chat-text"
        class="chat-input__field"
        type="text"
        placeholder="Escribe tu mensaje…"
        autocomplete="off"
        maxlength="500"
      />
      <button class="chat-input__send" type="submit" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </form>
  </div>

  <script src="/export.js"></script>
  <script src="/chat.js"></script>
</body>
</html>
