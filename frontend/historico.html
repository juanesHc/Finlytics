<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finlytics — Histórico de precios</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <a href="/" class="home-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
      Volver al home
    </a>

    <header class="header">
      <h1 class="logo">Fin<span>lytics</span></h1>
      <p class="tagline">Histórico de precios en el tiempo</p>
    </header>

    <div class="search">
      <input
        class="search__input"
        type="text"
        placeholder="Ticker (ej: AAPL)"
        autocomplete="off"
        maxlength="10"
      />
      <button class="search__btn" type="button">Ver histórico</button>
    </div>

    <p id="history-status" class="export-status" role="status"></p>

    <section id="history" class="history hidden">
      <div class="history__head">
        <h2 id="history-title" class="financials__title"></h2>
        <div class="financials__controls">
          <span id="history-meta" class="history__meta"></span>
          <label class="years-label">
            Rango
            <select id="range-select" class="years-select">
              <option value="30">1M</option>
              <option value="180">6M</option>
              <option value="365" selected>1A</option>
              <option value="1825">5A</option>
            </select>
          </label>
        </div>
      </div>

      <div class="chart-wrap">
        <svg id="price-chart" class="price-chart" viewBox="0 0 640 280" role="img" aria-label="Precio en el tiempo"></svg>
      </div>
    </section>
  </main>

  <!-- ============ Chat flotante ============ -->
  <button id="chat-fab" class="chat-fab" type="button" aria-label="Abrir chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 11.5a8.38 8.38 0 0 1 -0.9 3.8 8.5 8.5 0 0 1 -7.6 4.7 8.38 8.38 0 0 1 -3.8 -0.9 L3 21 l1.9 -5.7 a8.38 8.38 0 0 1 -0.9 -3.8 8.5 8.5 0 0 1 4.7 -7.6 8.38 8.38 0 0 1 3.8 -0.9 h0.5 a8.48 8.48 0 0 1 8 8 z" />
    </svg>
  </button>

  <div id="chat-panel" class="chat-panel hidden" role="dialog" aria-label="Asistente Finlytics">
    <header class="chat-panel__head">
      <span class="chat-panel__title">Asistente Finlytics</span>
      <button id="chat-close" class="chat-panel__close" type="button" aria-label="Cerrar chat">&times;</button>
    </header>

    <div id="chat-messages" class="chat-messages"></div>

    <form id="chat-form" class="chat-input">
      <input
        id="chat-text"
        class="chat-input__field"
        type="text"
        placeholder="Escribe tu mensaje…"
        autocomplete="off"
        maxlength="500"
      />
      <button class="chat-input__send" type="submit" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </form>
  </div>

  <script src="/historico.js"></script>
  <script src="/chat.js"></script>
</body>
</html>
