<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finlytics — Comparar empresas</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <a href="/" class="back">← Volver al inicio</a>
      <h1 class="logo">Fin<span>lytics</span></h1>
      <p class="tagline">Comparar dos empresas lado a lado</p>
    </header>

    <div class="compare-inputs">
      <input
        class="search__input"
        type="text"
        placeholder="Primer ticker (ej: AAPL)"
        autocomplete="off"
        maxlength="10"
      />
      <input
        class="search__input"
        type="text"
        placeholder="Segundo ticker (ej: MSFT)"
        autocomplete="off"
        maxlength="10"
      />
    </div>
    <button class="search__btn" type="button" style="width:100%">Comparar</button>

    <div class="wip" style="margin-top:1.2rem">
      <span class="wip__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14.7 6.3a4 4 0 0 0 -5.4 5.4 L3 18 v3 h3 l6.3 -6.3 a4 4 0 0 0 5.4 -5.4 l-2.6 2.6 -2 -2 2.6 -2.6 z" />
        </svg>
      </span>
      Pantalla lista. La <strong>comparación lado a lado</strong> reutilizará el
      endpoint de análisis (0 tokens si están cacheados) en el siguiente paso.
    </div>
  </main>
</body>
</html>
